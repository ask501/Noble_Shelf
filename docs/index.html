<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noble Shelf - ローカル同人誌ライブラリ管理ツール</title>
    
    <meta name="description" content="Noble Shelfは、PCローカルに保存された同人誌や漫画を快適に管理・閲覧するためのライブラリ管理ツールです。シンプルで高速な動作を目指しています。">
    <meta name="keywords" content="Noble Shelf, 同人誌管理, 漫画管理, ライブラリ, ローカル管理, フリーソフト">
    <link rel="canonical" href="https://ask501.github.io/Noble_Shelf/">

    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #4a90e2;
            --card-bg: #1e1e1e;
            --border-color: #333;
            --tab-inactive: #555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        header { text-align: center; padding: 40px 0 20px 0; }
        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 1px; }
        .tagline { color: #888; margin-top: 8px; font-size: 0.9rem; }

        .download-area {
            text-align: center;
            padding: 20px 0 40px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            padding: 10px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* タブメニュー */
        .tabs {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            border-bottom: 2px solid var(--border-color);
            overflow-x: auto; /* スマホ用 */
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--tab-inactive);
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            position: relative;
            white-space: nowrap;
            transition: color 0.3s;
        }

        .tab-btn.active { color: var(--accent-color); }
        .tab-btn.active::after {
            content: "";
            position: absolute;
            bottom: -2px; left: 0; width: 100%; height: 2px;
            background-color: var(--accent-color);
        }

        /* コンテンツ表示切り替え */
        .tab-content { display: none; padding: 30px 0; }
        .tab-content.active { display: block; }

        .content-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .release-item {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .release-item:last-child { border-bottom: none; }
        .release-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .version { font-weight: bold; color: var(--accent-color); }
        .date { color: #777; font-size: 0.85rem; }

        .loading { text-align: center; color: #666; font-style: italic; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Noble Shelf</h1>
        <p class="tagline">ローカル同人誌ライブラリ管理ツール</p>
    </header>

    <div id="latest-download" class="download-area">
        <p class="loading">情報を取得中...</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('about')">紹介 (README)</button>
        <button class="tab-btn" onclick="showTab('changelog')">更新履歴</button>
        <button class="tab-btn" onclick="showTab('license')">ライセンス</button>
    </div>

    <div id="about" class="tab-content active">
        <div id="readme-content" class="content-box">取得中...</div>
    </div>

    <div id="changelog" class="tab-content">
        <div id="history-list" class="content-box">取得中...</div>
    </div>

    <div id="license" class="tab-content">
        <div id="license-content" class="content-box">取得中...</div>
    </div>
</div>

<script>
    const REPO = 'ask501/Noble_Shelf';
    const API_RELEASES = `https://api.github.com/repos/${REPO}/releases`;
    const API_README = `https://api.github.com/repos/${REPO}/readme`;
    const API_LICENSE = `https://api.github.com/repos/${REPO}/license`;

    async function init() {
        fetchDownloadAndHistory();
        fetchReadme();
        fetchLicense();
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function fetchDownloadAndHistory() {
        const downloadEl = document.getElementById('latest-download');
        const historyEl = document.getElementById('history-list');
        try {
            const res = await fetch(API_RELEASES);
            const data = await res.json();
            if (data.length === 0) return;

            const latest = data[0];
            const asset = latest.assets.find(a => a.name.endsWith('.zip') || a.name.endsWith('.exe'));
            downloadEl.innerHTML = asset 
                ? `<p style="margin-bottom:15px;">最新: ${latest.tag_name}</p><a href="${asset.browser_download_url}" class="btn">${asset.name} をダウンロード</a>`
                : `<a href="${latest.html_url}" class="btn">最新版をGitHubで確認</a>`;

            historyEl.innerHTML = data.map(rel => `
                <div class="release-item">
                    <div class="release-header">
                        <span class="version">${rel.tag_name}</span>
                        <span class="date">${new Date(rel.published_at).toLocaleDateString()}</span>
                    </div>
                    <div>${rel.body || '更新内容なし'}</div>
                </div>
            `).join('');
        } catch (e) { downloadEl.innerHTML = "取得失敗"; }
    }

    async function fetchReadme() {
        const el = document.getElementById('readme-content');
        try {
            const res = await fetch(API_README, { headers: { 'Accept': 'application/vnd.github.v3.raw' } });
            el.textContent = await res.text();
        } catch (e) { el.textContent = "取得失敗"; }
    }

    async function fetchLicense() {
        const el = document.getElementById('license-content');
        try {
            const res = await fetch(API_LICENSE, { headers: { 'Accept': 'application/vnd.github.v3.raw' } });
            el.textContent = await res.text();
        } catch (e) { el.textContent = "LICENSEファイルが見つかりません。"; }
    }

    init();
</script>

</body>
</html>
